<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Roadmap Tracker</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", sans-serif;
}

body{
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#e2e8f0;
  min-height:100vh;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin:20px 0;
  font-size:30px;
  background: linear-gradient(90deg,#38bdf8,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* INPUT PANEL */
.panel{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  padding:15px;
  border-radius:15px;
  margin-bottom:20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

input, select{
  padding:10px;
  border-radius:10px;
  border:none;
  outline:none;
  margin:5px;
  width: 100%;
  background:#0b1220;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  color:black;
  font-weight:bold;
  margin-top:10px;
  width:100%;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

/* PROGRESS */
.progress-bar{
  height:20px;
  background:#1f2937;
  border-radius:50px;
  overflow:hidden;
  margin-top:10px;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#38bdf8);
  text-align:center;
  font-size:12px;
  line-height:20px;
  transition:0.4s;
}

/* CARD */
.card{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:15px;
  border-radius:15px;
  margin:10px 0;
}

.topic{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  align-items:center;
}

.topic:last-child{
  border:none;
}

.left{
  display:flex;
  gap:10px;
  align-items:center;
}

.delete{
  background:red;
  border:none;
  color:white;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

small{
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 AI Roadmap Tracker</h1>

<!-- ADD PANEL -->
<div class="panel">

  <input id="topicInput" placeholder="Enter new topic (e.g. Transformers, OS, CNN)" />

  <select id="category">
    <option>Python</option>
    <option>DSA</option>
    <option>Core CS</option>
    <option>Machine Learning</option>
    <option>Deep Learning</option>
    <option>NLP</option>
    <option>Computer Vision</option>
    <option>MLOps</option>
  </select>

  <button onclick="addTopic()">➕ Add Topic</button>

  <div class="progress-bar">
    <div id="progress" class="progress">0%</div>
  </div>

</div>

<div id="content"></div>

</div>

<script>
let syllabus = JSON.parse(localStorage.getItem("syllabus")) || {
  "Python": ["Basics","OOP"],
  "DSA": ["Arrays","Linked Lists"],
  "Core CS": ["DBMS","OS"],
  "Machine Learning": ["Linear Regression"],
  "Deep Learning": ["Neural Networks"],
  "NLP": ["Tokenization"],
  "Computer Vision": ["OpenCV"],
  "MLOps": ["Git"]
};

function save(){
  localStorage.setItem("syllabus", JSON.stringify(syllabus));
}

function addTopic(){
  let topic = document.getElementById("topicInput").value.trim();
  let cat = document.getElementById("category").value;

  if(!topic) return;

  if(!syllabus[cat]) syllabus[cat] = [];

  syllabus[cat].push(topic);

  document.getElementById("topicInput").value = "";

  save();
  render();
}

function toggle(cat, topic){
  let key = cat + "-" + topic;
  if(localStorage.getItem(key)){
    localStorage.removeItem(key);
  } else {
    localStorage.setItem(key, new Date().toLocaleDateString());
  }
  render();
}

function removeTopic(cat, topic){
  syllabus[cat] = syllabus[cat].filter(t => t !== topic);
  save();
  localStorage.removeItem(cat + "-" + topic);
  render();
}

function render(){
  let html = "";
  let total = 0;
  let done = 0;

  for(let cat in syllabus){

    html += `<div class="card"><h3>${cat}</h3>`;

    syllabus[cat].forEach(topic => {

      total++;

      let key = cat + "-" + topic;
      let completed = localStorage.getItem(key);

      if(completed) done++;

      html += `
      <div class="topic">
        <div class="left">
          <input type="checkbox" ${completed ? "checked" : ""}
          onchange="toggle('${cat}','${topic}')">

          <div>
            ${topic}<br>
            <small>${completed ? "Completed: " + completed : ""}</small>
          </div>
        </div>

        <button class="delete" onclick="removeTopic('${cat}','${topic}')">X</button>
      </div>
      `;
    });

    html += "</div>";
  }

  document.getElementById("content").innerHTML = html;

  let percent = total ? Math.round((done/total)*100) : 0;

  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("progress").innerText = percent + "%";
}

render();
</script>

</body>
</html>
