<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul AI Engineer Roadmap Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#0f172a;color:#e2e8f0}
.container{max-width:1100px;margin:auto;padding:20px}
h1{text-align:center;margin:20px 0}
.card{background:#1e293b;padding:16px;border-radius:12px;margin:12px 0}
.progress-wrap{background:#334155;border-radius:999px;overflow:hidden}
.progress{height:24px;width:0;background:#22c55e;text-align:center;line-height:24px;color:white;font-weight:bold}
.section-title{margin-bottom:10px}
.topic{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #334155}
.topic:last-child{border-bottom:none}
input[type=search]{width:100%;padding:10px;border-radius:8px;border:none;margin-bottom:15px}
.date{font-size:12px;color:#94a3b8}
</style>
</head>
<body>
<div class="container">
<h1>🚀 Rahul AI Engineer Tracker</h1>

<div class="card">
<input type="search" id="search" placeholder="Search topics...">
<div class="progress-wrap"><div id="progress" class="progress">0%</div></div>
</div>

<div id="content"></div>
</div>

<script>
const syllabus={
"Python":["Basics","OOP","File Handling","Modules","Libraries"],
"DSA":["Arrays","Linked Lists","Stacks","Queues","Trees","Graphs","DP"],
"Core CS":["DBMS","OS","Computer Networks"],
"Machine Learning":["Linear Regression","Logistic Regression","KNN","SVM"],
"Deep Learning":["Neural Networks","CNN","RNN","Transformers"],
"NLP":["Tokenization","Embeddings","BERT"],
"Computer Vision":["OpenCV","Image Processing","YOLO"],
"MLOps":["Git","Docker","CI/CD","Deployment"]
};

function render(){
let html="";
let total=0,done=0;
const q=document.getElementById("search").value.toLowerCase();

for(const section in syllabus){
 let topics=syllabus[section].filter(t=>t.toLowerCase().includes(q));
 if(!topics.length) continue;

 html+=`<div class="card"><h2 class="section-title">${section}</h2>`;

 topics.forEach(topic=>{
   total++;
   let key=section+"-"+topic;
   let data=localStorage.getItem(key);
   if(data) done++;

   html+=`
   <div class="topic">
    <div>
      <input type="checkbox" ${data?"checked":""}
      onchange="toggle('${key}')">
      ${topic}
    </div>
    <div class="date">${data?("Completed: "+data):""}</div>
   </div>`;
 });

 html+="</div>";
}

document.getElementById("content").innerHTML=html;

let percent=total?Math.round(done/total*100):0;
let p=document.getElementById("progress");
p.style.width=percent+"%";
p.textContent=percent+"%";
}

function toggle(key){
 if(localStorage.getItem(key)){
   localStorage.removeItem(key);
 }else{
   localStorage.setItem(key,new Date().toLocaleDateString());
 }
 render();
}

document.getElementById("search").addEventListener("input",render);
render();
</script>
</body>
</html>
